<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Pong</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Simple Pong</h1>
    <div class="scoreboard">
      <div id="playerScore" class="score">0</div>
      <div class="center-controls">
        <div class="instructions">
          Left: mouse / ↑ ↓ keys<br/>
          Pause: Space — Restart: Enter
        </div>
      </div>
      <div id="computerScore" class="score">0</div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="footer">
      <small>Built with HTML, CSS & JavaScript — Left paddle: player, Right paddle: computer</small>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
